version: '3.8'

services:
  db:
    image: mongo:6
    container_name: learning-db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: learning-redis
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3-management
    container_name: learning-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'

  minio:
    image: minio/minio:latest
    container_name: learning-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  mongo-data:
  minio-data:
