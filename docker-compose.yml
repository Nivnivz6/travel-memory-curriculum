version: '3.8'

services:
  db:
    image: mongo:6
    container_name: learning-db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: learning-redis
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3-management
    container_name: learning-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'

  minio:
    image: minio/minio:latest
    container_name: learning-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  init-minio:
    image: minio/mc
    container_name: learning-init-minio
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/learning-uploads --ignore-existing;
      /usr/bin/mc anonymous set download myminio/learning-uploads;
      exit 0;
      "

# TODO: Phase 3 - Wire up the Backend API Service
# 1. Define a service named 'api'
# 2. Use 'build: ./backend' to point to your new Dockerfile
# 3. Map port 3000:3000
# 4. Add 'depends_on' for db, redis, rabbitmq, and minio
# 5. Inject environment variables (MONGODB_URI, REDIS_URL, etc.)
#    HINT: Inside the Docker network, use the service names (e.g., mongodb://db:27017)

volumes:
  mongo-data:
  minio-data:
